name: Auto-Renew PythonAnywhere (Multi-Account)

on:
  schedule:
    - cron: '0 4 1,15 * *'
  workflow_dispatch:

jobs:
  renew_and_keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        account:
          - id: "account_1"
            username_key: "PA_USERNAME_1"
            password_key: "PA_PASSWORD_1"
          - id: "account_2"
            username_key: "PA_USERNAME_2"
            password_key: "PA_PASSWORD_2"

    steps:
      - name: Checkout repository
        run: |
          # 코파일럿이 지적한 https:// 주소와 슬래시 누락을 완벽히 해결했습니다.
          git clone --depth=50 "github.com{{ github.repository }}.git" .
          git checkout ${{ github.ref_name }}

      - name: Setup Python
        run: |
          echo "Python version:"
          python3 --version

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install requests beautifulsoup4 python-dotenv

      - name: Run renewal script (${{ matrix.account.id }})
        env:
          PA_USERNAME: ${{ secrets[matrix.account.username_key] }}
          PA_PASSWORD: ${{ secrets[matrix.account.password_key] }}
        run: python3 renew_python_anywhere.py

      - name: Keep Alive Workflow (Success)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p .github/logs
          LOG_FILE=".github/logs/workflow_runs.log"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "========================================" >> $LOG_FILE
          echo "Workflow Run: $TIMESTAMP" >> $LOG_FILE
          echo "Account: ${{ matrix.account.id }}" >> $LOG_FILE
          echo "Status: SUCCESS ✅" >> $LOG_FILE
          echo "Trigger: ${{ github.event_name }}" >> $LOG_FILE
          echo "Repository: ${{ github.repository }}" >> $LOG_FILE
          echo "Branch: ${{ github.ref_name }}" >> $LOG_FILE
          echo "Run ID: ${{ github.run_id }}" >> $LOG_FILE
          echo "Run Number: ${{ github.run_number }}" >> $LOG_FILE
          echo "========================================" >> $LOG_FILE
          echo "" >> $LOG_FILE
          
          git pull origin ${{ github.ref_name }} --rebase || true
          git add $LOG_FILE
          git commit -m "log: workflow run SUCCESS for ${{ matrix.account.id }} on $TIMESTAMP" || true
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com{{ github.repository }}.git"
          git push origin ${{ github.ref_name }}
          echo "✅ Success logged and committed"

      - name: Keep Alive Workflow (Failure)
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p .github/logs
          LOG_FILE=".github/logs/workflow_runs.log"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "========================================" >> $LOG_FILE
          echo "Workflow Run: $TIMESTAMP" >> $LOG_FILE
          echo "Account: ${{ matrix.account.id }}" >> $LOG_FILE
          echo "Status: FAILED ❌" >> $LOG_FILE
          echo "Trigger: ${{ github.event_name }}" >> $LOG_FILE
          echo "Repository: ${{ github.repository }}" >> $LOG_FILE
          echo "Branch: ${{ github.ref_name }}" >> $LOG_FILE
          echo "Run ID: ${{ github.run_id }}" >> $LOG_FILE
          echo "Run Number: ${{ github.run_number }}" >> $LOG_FILE
          echo "Note: Check GitHub Actions logs for error details" >> $LOG_FILE
          echo "========================================" >> $LOG_FILE
          echo "" >> $LOG_FILE
          
          git pull origin ${{ github.ref_name }} --rebase || true
          git add $LOG_FILE
          git commit -m "log: workflow run FAILED for ${{ matrix.account.id }} on $TIMESTAMP" || true
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com{{ github.repository }}.git"
          git push origin ${{ github.ref_name }}
          echo "❌ Failure logged and committed"
