name: Auto-Renew PythonAnywhere (Multi-Account)

on:
  schedule:
    - cron: '0 4 1,15 * *'
  workflow_dispatch:

concurrency:
  group: pythonanywhere-renew
  cancel-in-progress: false

jobs:
  renew_account_1:
    name: Renew Account 1
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        run: |
          echo "Python version:"
          python3 --version

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install requests beautifulsoup4 python-dotenv

      - name: Run renewal script
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME_1 }}
          PA_PASSWORD: ${{ secrets.PA_PASSWORD_1 }}
        run: python3 renew_python_anywhere.py

  renew_account_2:
    name: Renew Account 2
    runs-on: ubuntu-latest

    permissions:
      contents: read

    needs: renew_account_1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        run: |
          echo "Python version:"
          python3 --version

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install requests beautifulsoup4 python-dotenv

      - name: Run renewal script
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME_2 }}
          PA_PASSWORD: ${{ secrets.PA_PASSWORD_2 }}
        run: python3 renew_python_anywhere.py
