name: Auto-Renew PythonAnywhere (Multi-Account)

on:
  schedule:
    - cron: '0 4 1,15 * *'
  workflow_dispatch:

concurrency:
  group: pythonanywhere-renew
  cancel-in-progress: false

jobs:
  renew_account_1:
    name: Renew Account 1
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Setup Python
        run: |
          echo "Python version:"
          python3 --version

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install requests beautifulsoup4 python-dotenv

      - name: Run renewal script
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME_1 }}
          PA_PASSWORD: ${{ secrets.PA_PASSWORD_1 }}
        run: python3 renew_python_anywhere.py

      - name: Log Success
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p .github/logs
          LOG_FILE=".github/logs/workflow_runs_account_1.log"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          {
            echo "========================================"
            echo "Workflow Run: $TIMESTAMP"
            echo "Account: account_1"
            echo "Status: SUCCESS ✅"
            echo "Trigger: ${{ github.event_name }}"
            echo "Repository: ${{ github.repository }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Run ID: ${{ github.run_id }}"
            echo "Run Number: ${{ github.run_number }}"
            echo "========================================"
            echo ""
          } >> $LOG_FILE

          git add $LOG_FILE

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "log: SUCCESS account_1 $TIMESTAMP"
            git push
          fi

      - name: Log Failure
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p .github/logs
          LOG_FILE=".github/logs/workflow_runs_account_1.log"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          {
            echo "========================================"
            echo "Workflow Run: $TIMESTAMP"
            echo "Account: account_1"
            echo "Status: FAILED ❌"
            echo "Trigger: ${{ github.event_name }}"
            echo "Repository: ${{ github.repository }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Run ID: ${{ github.run_id }}"
            echo "Run Number: ${{ github.run_number }}"
            echo "Note: Check GitHub Actions logs for details"
            echo "========================================"
            echo ""
          } >> $LOG_FILE

          git add $LOG_FILE

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "log: FAILED account_1 $TIMESTAMP"
            git push
          fi

  renew_account_2:
    name: Renew Account 2
    runs-on: ubuntu-latest

    permissions:
      contents: write

    needs: renew_account_1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
