name: Auto-Renew PythonAnywhere (Multi-Account)

on:
  schedule:
    - cron: '0 4 1,15 * *'
  workflow_dispatch:

jobs:
  renew_and_keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      # 한 계정이 실패해도 다른 계정은 건너뛰지 않고 계속 실행하도록 설정합니다.
      fail-fast: false
      matrix:
        account:
          - id: "account_1"
            username: "PA_USERNAME_1"
            password: "PA_PASSWORD_1"
          - id: "account_2"
            username: "PA_USERNAME_2"
            password: "PA_PASSWORD_2"

    steps:
      - name: Checkout repository
        run: |
          git clone --depth=50 https://github.com/${{ github.repository }}.git .
          git checkout ${{ github.ref_name }}

      - name: Setup Python
        run: |
          echo "Python version:"
          python3 --version

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install requests beautifulsoup4 python-dotenv

      - name: Run renewal script (${{ matrix.account.id }})
        env:
          # GitHub Secrets에서 각각 다른 변수를 매칭하여 가져옵니다.
          PA_USERNAME: ${{ secrets[matrix.account.username] }}
          PA_PASSWORD: ${{ secrets[matrix.account.password] }}
        run: python3 renew_python_anywhere.py

      - name: Keep Alive Workflow (Success)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p .github/logs
          LOG_FILE=".github/logs/workflow_runs.log"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "========================================" >> $LOG_FILE
          echo "Workflow Run: $TIMESTAMP" >> $LOG_FILE
          echo "Account: ${{ matrix.account.id }}" >> $LOG_FILE
          echo "Status: SUCCESS ✅" >> $LOG_FILE
          echo "Trigger: ${{ github.event_name }}" >> $LOG_FILE
          echo "Repository: ${{ github.repository }}" >> $LOG_FILE
          echo "Branch: ${{ github.ref_name }}" >> $LOG_FILE
          echo "Run ID: ${{ github.run_id }}" >> $LOG_FILE
          echo "Run Number: ${{ github.run_number }}" >> $LOG_FILE
          echo "========================================" >> $LOG_FILE
          echo "" >> $LOG_FILE
          
          # 여러 계정이 동시에 push할 때 충돌을 방지하기 위해 pull을 먼저 수행합니다.
          git pull origin ${{ github.ref_name }} --rebase || true
          git add $LOG_FILE
          git commit -m "log: workflow run SUCCESS for ${{ matrix.account.id }} on $TIMESTAMP" || true
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin ${{ github.ref_name }}
          echo "✅ Success logged and committed"

      - name: Keep Alive Workflow (Failure)
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p .github/logs
          LOG_FILE=".github/logs/workflow_runs.log"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "========================================" >> $LOG_FILE
          echo "Workflow Run: $TIMESTAMP" >> $LOG_FILE
          echo "Account: ${{ matrix.account.id }}" >> $LOG_FILE
          echo "Status: FAILED ❌" >> $LOG_FILE
          echo "Trigger: ${{ github.event_name }}" >> $LOG_FILE
          echo "Repository: ${{ github.repository }}" >> $LOG_FILE
          echo "Branch: ${{ github.ref_name }}" >> $LOG_FILE
          echo "Run ID: ${{ github.run_id }}" >> $LOG_FILE
          echo "Run Number: ${{ github.run_number }}" >> $LOG_FILE
          echo "Note: Check GitHub Actions logs for error details" >> $LOG_FILE
          echo "========================================" >> $LOG_FILE
          echo "" >> $LOG_FILE
          
          git pull origin ${{ github.ref_name }} --rebase || true
          git add $LOG_FILE
          git commit -m "log: workflow run FAILED for ${{ matrix.account.id }} on $TIMESTAMP" || true
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin ${{ github.ref_name }}
          echo "❌ Failure logged and committed"
